<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b1026" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GAIA" />
<title>GAIA — Idle Terraform</title>
<style>
  :root {
    --bg: #0b1026;
    --panel: #161e44;
    --panel2: #1d2756;
    --accent: #5ce08a;
    --accent2: #38c172;
    --text: #e8edff;
    --muted: #8b95c9;
    --gold: #ffd866;
    --purple: #b98bff;
    --danger: #ff6b81;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at 50% -10%, #1a2150 0%, var(--bg) 60%);
    color: var(--text); overflow: hidden; user-select: none;
  }
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star { position: absolute; background: #fff; border-radius: 50%;
    opacity: 0.6; animation: twinkle 3s infinite ease-in-out; }
  @keyframes twinkle { 0%,100% { opacity: 0.15; } 50% { opacity: 0.95; } }

  /* drifting satellite */
  .satellite { position: fixed; top: 0; left: 0; font-size: 20px; z-index: 0; pointer-events: none;
    opacity: 0.9; filter: drop-shadow(0 0 4px rgba(150,200,255,0.6)); will-change: transform; }

  /* meteors / shooting stars */
  .meteor { position: fixed; top: 0; left: 0; width: 3px; height: 3px; border-radius: 50%;
    background: #fff; z-index: 0; pointer-events: none; box-shadow: 0 0 6px 1px #cfe6ff; will-change: transform; }
  .meteor::after { content: ''; position: absolute; right: 2px; top: 50%; transform: translateY(-50%);
    width: 70px; height: 1.5px; border-radius: 2px;
    background: linear-gradient(90deg, rgba(207,230,255,0.9), rgba(207,230,255,0)); }
  .meteor.big { width: 4px; height: 4px; box-shadow: 0 0 10px 2px #fff; }
  .meteor.big::after { width: 120px; height: 2px; }

  #app {
    position: relative; z-index: 1;
    display: grid; grid-template-rows: auto 1fr auto; height: 100%;
    max-width: 480px; margin: 0 auto; padding: 10px; gap: 8px;
  }

  .stats {
    background: linear-gradient(135deg, var(--panel), var(--panel2));
    border-radius: var(--radius); padding: 10px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3); text-align: center;
  }
  .biomass { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1.1; }
  .biomass small { font-size: 13px; color: var(--muted); font-weight: 600; }
  .substats { display: flex; justify-content: center; gap: 14px; margin-top: 4px; flex-wrap: wrap; }
  .substats span { font-size: 12px; color: var(--muted); }
  .substats b { color: var(--gold); }
  .stage-name { font-size: 13px; color: var(--accent); font-weight: 700; margin-top: 4px; }
  .gaia-badge { color: var(--purple); }

  .planet-area {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; z-index: 1; overflow: visible; min-height: 0; padding: 6px 0;
  }

  /* pulsing aura behind planet */
  .aura { position:absolute; top:50%; left:50%; width:180px; height:180px; margin:-90px 0 0 -90px;
    border-radius:50%; z-index:0; pointer-events:none;
    box-shadow:0 0 55px 18px var(--accent); opacity:0.2; animation: auraPulse 4.5s ease-in-out infinite; }
  @keyframes auraPulse { 0%,100%{ transform:scale(1); opacity:0.15; } 50%{ transform:scale(1.18); opacity:0.3; } }

  /* orbiting moon */
  .orbit { position:absolute; top:50%; left:50%; width:252px; height:252px; margin:-126px 0 0 -126px;
    z-index:0; pointer-events:none; animation: orbitSpin 16s linear infinite; }
  .moon { position:absolute; top:-4px; left:50%; margin-left:-9px; font-size:18px; filter:drop-shadow(0 0 5px rgba(180,210,255,0.8)); }
  @keyframes orbitSpin { to { transform: rotate(360deg); } }

  /* tap ripple */
  .ripple { position:absolute; width:160px; height:160px; border:2px solid var(--accent);
    border-radius:50%; pointer-events:none; z-index:4; }

  /* screen flash for big moments */
  .flash { position:fixed; inset:0; pointer-events:none; z-index:90;
    background:radial-gradient(circle, rgba(255,255,255,0.55), transparent 65%); opacity:0; }
  .planet {
    width: min(180px, 62vw, 40vh); height: min(180px, 62vw, 40vh); aspect-ratio: 1 / 1;
    border-radius: 50%; cursor: pointer; position: relative;
    flex-shrink: 0; overflow: hidden;
    background: radial-gradient(circle at 35% 30%, #6b7088, #2e3142 70%, #1a1c28);
    box-shadow: 0 0 0 0 rgba(92,224,138,0);
    transition: background 1.2s ease, box-shadow 0.4s ease, transform 0.08s; border: none;
  }
  .planet:active { transform: scale(0.95); }
  .planet::after { content:''; position:absolute; inset:0; border-radius:50%; z-index:2;
    box-shadow: inset 14px 14px 28px rgba(255,255,255,0.06), inset -6px -6px 18px rgba(0,0,0,0.18); }
  .pcanvas { position:absolute; inset:0; width:100%; height:100%; border-radius:50%; z-index:1; display:block; }

  /* planet surface terrain (hills/valleys/grooves) — slowly drifts & breathes */
  .terrain { position:absolute; left:-30%; top:-30%; width:160%; height:160%; z-index:1;
    pointer-events:none; mix-blend-mode:overlay; opacity:0.5; will-change:transform;
    background:
      radial-gradient(circle at 28% 30%, rgba(255,255,255,0.6) 0 6%, transparent 10%),
      radial-gradient(circle at 63% 22%, rgba(0,0,0,0.55) 0 7%, transparent 12%),
      radial-gradient(circle at 76% 54%, rgba(255,255,255,0.45) 0 9%, transparent 14%),
      radial-gradient(circle at 40% 63%, rgba(0,0,0,0.6) 0 10%, transparent 16%),
      radial-gradient(circle at 52% 44%, rgba(255,255,255,0.4) 0 12%, transparent 19%),
      radial-gradient(circle at 20% 70%, rgba(0,0,0,0.45) 0 6%, transparent 11%),
      radial-gradient(circle at 82% 80%, rgba(255,255,255,0.35) 0 7%, transparent 13%),
      radial-gradient(circle at 35% 18%, rgba(0,0,0,0.35) 0 5%, transparent 9%);
    animation: planetSpin 80s linear infinite; }
  @keyframes planetSpin {
    0%   { transform: rotate(0deg)   scale(1); }
    50%  { transform: rotate(180deg) scale(1.05); }
    100% { transform: rotate(360deg) scale(1); } }

  /* life growing on the planet surface (one icon per generator type owned) */
  /* geography: dry riverbeds + mountain ranges, embossed so they read on any planet color */
  .geo { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.65;
    animation: planetSpin 80s linear infinite; }

  /* realistic surface life: tiny features that ride on the rotating planet */
  .flora { position:absolute; inset:0; z-index:1; pointer-events:none; animation: planetSpin 80s linear infinite; }
  .flora i { position:absolute; display:block; transform:translate(-50%,-50%); border-radius:50%; }

  /* per-planet surface effect overlay (each planet animates differently) */
  .planet-fx { position:absolute; inset:0; border-radius:50%; z-index:1; pointer-events:none;
    background-size:100% 100%; background-repeat:no-repeat; }
  .fx-water, .fx-ice, .fx-aurora { background-size:220% 100%; }
  @keyframes fxSpin  { to { transform: rotate(360deg); } }
  @keyframes fxPulse { 0%,100%{ opacity:0.12; } 50%{ opacity:0.5; } }
  @keyframes fxSweep { 0%{ background-position:-120% 0; } 100%{ background-position:240% 0; } }
  .fx-clouds  { mix-blend-mode:screen; opacity:0.35; animation:fxSpin 55s linear infinite;
    background:radial-gradient(circle at 32% 38%,rgba(255,255,255,.6) 0 7%,transparent 11%),radial-gradient(circle at 68% 60%,rgba(255,255,255,.5) 0 9%,transparent 13%),radial-gradient(circle at 55% 25%,rgba(255,255,255,.4) 0 6%,transparent 10%); }
  .fx-water   { mix-blend-mode:screen; opacity:0.5; animation:fxSweep 4.5s linear infinite;
    background:linear-gradient(115deg,transparent 35%,rgba(180,240,255,.85) 50%,transparent 65%); }
  .fx-lush    { mix-blend-mode:screen; animation:fxPulse 5s ease-in-out infinite;
    background:radial-gradient(circle at 50% 55%,rgba(140,255,150,.7),transparent 65%); }
  .fx-lava    { mix-blend-mode:screen; animation:fxPulse 2.2s ease-in-out infinite;
    background:radial-gradient(circle at 40% 60%,rgba(255,140,40,.9) 0 18%,transparent 30%),radial-gradient(circle at 68% 40%,rgba(255,90,20,.8) 0 14%,transparent 26%); }
  .fx-ice     { mix-blend-mode:screen; opacity:0.65; animation:fxSweep 6s linear infinite;
    background:linear-gradient(100deg,transparent 40%,rgba(255,255,255,.95) 50%,transparent 60%); }
  .fx-aurora  { mix-blend-mode:screen; opacity:0.55; animation:fxSweep 7s linear infinite;
    background:linear-gradient(120deg,transparent 25%,rgba(120,255,180,.7) 45%,rgba(255,220,120,.7) 60%,transparent 80%); }
  .fx-nebula  { mix-blend-mode:screen; opacity:0.5; animation:fxSpin 30s linear infinite;
    background:radial-gradient(circle at 38% 42%,rgba(200,130,255,.8) 0 20%,transparent 38%),radial-gradient(circle at 65% 62%,rgba(150,90,230,.7) 0 16%,transparent 32%); }
  .fx-volcano { mix-blend-mode:overlay; animation:fxPulse 1.8s ease-in-out infinite;
    background:radial-gradient(circle at 50% 65%,rgba(255,60,40,.95) 0 22%,rgba(80,0,0,.6) 45%,transparent 70%); }
  .fx-cosmic  { mix-blend-mode:screen; opacity:0.6; animation:fxSpin 40s linear infinite;
    background:radial-gradient(circle at 30% 30%,#fff 0 1.5%,transparent 3%),radial-gradient(circle at 70% 45%,#ffd0ff 0 1.5%,transparent 3%),radial-gradient(circle at 50% 70%,#fff 0 1.5%,transparent 3%),radial-gradient(circle at 80% 75%,#d0d0ff 0 1.5%,transparent 3%); }
  .fx-divine  { mix-blend-mode:screen; opacity:0.55; animation:fxSpin 22s linear infinite;
    background:repeating-conic-gradient(from 0deg, rgba(160,255,224,.55) 0deg 10deg, transparent 10deg 24deg); }

  .ambient { position:absolute; font-size:14px; pointer-events:none; z-index:3;
    filter:drop-shadow(0 0 3px rgba(255,255,255,0.4)); }
  .planet.bump { animation: bump 0.5s ease; }
  @keyframes bump { 0%{transform:scale(1);} 40%{transform:scale(1.12);} 100%{transform:scale(1);} }
  .planet-hint { color: var(--muted); font-size: 11px; margin-top: 10px; }

  .float { position: absolute; pointer-events: none; font-weight: 800; color: var(--accent);
    font-size: 18px; animation: floatUp 0.9s ease-out forwards; z-index: 5;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
  @keyframes floatUp { 0%{opacity:1; transform:translateY(0) scale(1);} 100%{opacity:0; transform:translateY(-60px) scale(1.3);} }
  .particle { position: absolute; pointer-events: none; font-size: 22px; z-index: 6;
    animation: burst 1s ease-out forwards; }
  @keyframes burst { 0%{opacity:1; transform: translate(0,0) scale(0.4);} 100%{opacity:0;} }

  .tabs { display: flex; gap: 6px; }
  .tab { flex: 1; padding: 8px 4px; text-align: center; border-radius: 10px;
    background: var(--panel); color: var(--muted); font-weight: 700; font-size: 12px;
    cursor: pointer; border: 1px solid transparent; position: relative; }
  .tab.active { background: var(--panel2); color: var(--accent); border-color: var(--accent2); }
  .tab .dot { position:absolute; top:4px; right:6px; width:7px; height:7px; border-radius:50%;
    background: var(--gold); display:none; }
  .tab.has-news .dot { display:block; }

  .buymode { display:flex; gap:6px; margin: 6px 0; }
  .buymode .bm { flex:1; padding:5px; text-align:center; border-radius:8px; font-size:11px;
    font-weight:700; background: var(--panel); color: var(--muted); cursor:pointer; }
  .buymode .bm.active { background: var(--accent2); color:#06210f; }

  .panel-wrap { min-height: 0; display: flex; flex-direction: column; }
  .shop { background: linear-gradient(135deg, var(--panel), var(--panel2));
    border-radius: var(--radius); padding: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .shop::-webkit-scrollbar { width: 6px; }
  .shop::-webkit-scrollbar-thumb { background: var(--panel2); border-radius: 3px; }

  .item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04);
    border-radius: 10px; padding: 10px; margin-bottom: 8px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05); transition: background 0.15s, transform 0.08s; }
  .item:not(.locked):active { transform: scale(0.985); }
  .item.affordable { border-color: var(--accent2); }
  .item.locked { opacity: 0.5; cursor: default; }
  .item .emoji { font-size: 26px; width: 38px; text-align: center; }
  .item .info { flex: 1; min-width: 0; }
  .item .name { font-weight: 700; font-size: 14px; }
  .item .desc { font-size: 11px; color: var(--muted); }
  .item .right { text-align: right; white-space: nowrap; }
  .item .cost { font-weight: 800; font-size: 13px; color: var(--gold); }
  .item .cost.cant { color: var(--danger); }
  .item .owned { font-size: 11px; color: var(--muted); }
  .pbar { height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; margin-top:5px; }
  .pbar > i { display:block; height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:3px; }

  /* prestige tab */
  .prestige-box { text-align:center; padding: 8px; }
  .prestige-box .gaia-big { font-size: 30px; font-weight: 800; color: var(--purple); }
  .prestige-box p { color: var(--muted); font-size: 12px; margin: 6px 0; }
  .prestige-box .gain { font-size: 22px; font-weight: 800; color: var(--gold); margin: 10px 0; }
  .prestige-btn { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 800;
    font-size: 14px; cursor: pointer; background: linear-gradient(135deg, var(--purple), #8b5cf6);
    color: #fff; width: 100%; }
  .prestige-btn:disabled { opacity: 0.4; cursor: default; background: var(--panel); color: var(--muted); }

  /* achievements */
  .ach-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ach { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 8px; text-align:center;
    border: 1px solid rgba(255,255,255,0.05); }
  .ach.done { border-color: var(--gold); background: rgba(255,216,102,0.08); }
  .ach .ae { font-size: 22px; filter: grayscale(1) opacity(0.4); }
  .ach.done .ae { filter: none; }
  .ach .an { font-size: 11px; font-weight: 700; margin-top: 2px; }
  .ach .ad { font-size: 10px; color: var(--muted); }

  .footer { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 9px; border-radius: 10px; border: none; background: var(--panel);
    color: var(--muted); font-weight: 700; font-size: 12px; cursor: pointer; }
  .btn:active { transform: scale(0.97); }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50;
    display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-bg.show { display: flex; }
  .modal { background: linear-gradient(135deg, var(--panel), var(--panel2)); border-radius: var(--radius);
    padding: 24px; text-align: center; max-width: 320px; border: 1px solid var(--accent2); }
  .modal h2 { color: var(--accent); margin-bottom: 8px; }
  .modal p { color: var(--text); margin-bottom: 6px; }
  .modal .big { font-size: 26px; font-weight: 800; color: var(--gold); margin: 12px 0; }
  .modal button { margin-top: 12px; padding: 10px 24px; border: none; border-radius: 10px;
    background: var(--accent2); color: #06210f; font-weight: 800; cursor: pointer; font-size: 14px; }

  .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); color: var(--text); padding: 10px 18px; border-radius: 10px;
    font-size: 13px; z-index: 60; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    border: 1px solid var(--accent2); text-align:center; }
  .toast.show { opacity: 1; }

  /* monetisasi / boost */
  .boost-card { background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .boost-card .bt { font-weight:800; font-size:14px; display:flex; align-items:center; gap:6px; }
  .boost-card .bd { font-size:11px; color:var(--muted); margin:4px 0 10px; }
  .boost-card button { width:100%; padding:10px; border:none; border-radius:9px; font-weight:800;
    font-size:13px; cursor:pointer; }
  .ad-btn { background: linear-gradient(135deg,#ffb347,#ff8c42); color:#3a1d00; }
  .ad-btn:disabled { opacity:0.45; cursor:default; filter:grayscale(0.4); }
  .iap-btn { background: linear-gradient(135deg,var(--purple),#8b5cf6); color:#fff; }
  .iap-btn:disabled { opacity:0.5; cursor:default; }
  .boost-active-banner { background: linear-gradient(90deg, rgba(255,179,71,0.25), rgba(255,140,66,0.15));
    border:1px solid var(--gold); border-radius:9px; padding:8px; text-align:center; font-size:12px;
    color:var(--gold); font-weight:700; margin-bottom:10px; }

  /* overlay iklan simulasi */
  .ad-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:80; display:none;
    flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; padding:24px; }
  .ad-overlay.show { display:flex; }
  .ad-overlay .label { font-size:11px; color:#888; position:absolute; top:16px; left:16px; }
  .ad-overlay .skip { position:absolute; top:14px; right:16px; font-size:12px; color:#ccc;
    border:1px solid #555; border-radius:6px; padding:4px 10px; cursor:pointer; }
  .ad-overlay .fake { font-size:60px; margin-bottom:14px; animation: spin 2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ad-overlay h3 { color:var(--gold); margin-bottom:6px; }
  .ad-bar { width:200px; height:6px; background:#333; border-radius:3px; margin-top:16px; overflow:hidden; }
  .ad-bar > i { display:block; height:100%; width:0; background:var(--accent); }

  /* golden sprout */
  .golden { position:fixed; z-index:70; font-size:40px; cursor:pointer; filter: drop-shadow(0 0 12px var(--gold));
    animation: goldenPulse 1s ease-in-out infinite; }
  @keyframes goldenPulse { 0%,100%{ transform:scale(1) rotate(-8deg);} 50%{ transform:scale(1.18) rotate(8deg);} }

  /* bottom dock (tabs + utility) — always visible, opaque so the closed sheet hides behind it */
  .dock { position: relative; z-index: 10; background: var(--bg);
    display: flex; flex-direction: column; gap: 8px; padding-top: 6px; }

  /* slide-up menu sheet (only shows when a tab is pressed) */
  .sheet-backdrop { position:absolute; inset:0; z-index:5; background:rgba(5,8,20,0.5);
    opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(1px); }
  .sheet-backdrop.show { opacity:1; pointer-events:auto; }
  .sheet { position:absolute; left:0; right:0; bottom:0; z-index:6; max-height:100%;
    display:flex; flex-direction:column; padding:4px 10px 10px;
    background: linear-gradient(135deg, var(--panel), var(--panel2));
    border-radius:20px 20px 0 0; box-shadow:0 -12px 40px rgba(0,0,0,0.55);
    transform: translateY(112%); transition: transform 0.36s cubic-bezier(.2,.85,.25,1); }
  .sheet.open { transform: translateY(0); }
  .sheet-bar { display:flex; align-items:center; justify-content:space-between; padding:6px 4px 8px; }
  .sheet-bar::before { content:''; position:absolute; left:50%; top:5px; transform:translateX(-50%);
    width:42px; height:4px; border-radius:2px; background:var(--muted); opacity:0.5; }
  .sheet-title { font-weight:800; font-size:14px; color:var(--accent); }
  .sheet-close { font-size:16px; color:var(--muted); cursor:pointer; padding:2px 8px; border-radius:8px; }
  .sheet-close:active { background:rgba(255,255,255,0.08); }
</style>
</head>
<body>
<div id="stars"></div>

<div id="app">
  <div class="stats">
    <div class="biomass"><span id="biomass">0</span> <small>Biomass 🌿</small></div>
    <div class="substats">
      <span><b id="perSec">0</b> /sec</span>
      <span class="gaia-badge"><b id="gaiaTop" style="color:var(--purple)">0🌟</b></span>
      <span>x<b id="multTop">1.0</b> bonus</span>
    </div>
    <div class="stage-name" id="stageName">Dead Planet</div>
    <div id="boostInfo" style="display:none;color:var(--gold);font-size:12px;font-weight:700;margin-top:3px"></div>
  </div>

  <div class="planet-area">
    <div class="aura"></div>
    <div class="orbit"><span class="moon">🌑</span></div>
    <button class="planet" id="planet"><canvas class="pcanvas" id="planetCanvas" width="128" height="128"></canvas></button>
    <div class="planet-hint">Tap the planet to grow life</div>

    <div class="sheet-backdrop" id="sheetBackdrop"></div>
    <div class="sheet" id="sheet">
      <div class="sheet-bar">
        <span class="sheet-title" id="sheetTitle">Generators</span>
        <span class="sheet-close" id="sheetClose">✕</span>
      </div>
      <div class="shop" id="shop"></div>
    </div>
  </div>

  <div class="dock">
    <div class="tabs">
      <div class="tab" data-tab="gen">🌱</div>
      <div class="tab" data-tab="upg">⚡</div>
      <div class="tab" data-tab="mgr">👷</div>
      <div class="tab" data-tab="planets">🪐<span class="dot" id="planetDot"></span></div>
      <div class="tab" data-tab="prestige">🌟<span class="dot" id="prestigeDot"></span></div>
      <div class="tab" data-tab="ach">🏆<span class="dot"></span></div>

<script>

/* ============================================================

   offline earnings, sound (WebAudio), partikel, buy x1/x10/Max.

// ---------- DATA ----------
const GENERATORS = [

const UPGRADES = [
  { id:'click1', name:'Green Thumb',     emoji:'✋', cost:120,    type:'click', mult:2, desc:'Tap power x2' },
  { id:'click2', name:'Fertile Touch',   emoji:'🤲', cost:6000,   type:'click', mult:3, desc:'Tap power x3' },

const STAGES = [
  { min:0,         name:'Dead Planet',     core:'#6b7088', mid:'#2e3142' },
  { min:50,        name:'Damp Rocks',      core:'#7a8a6b', mid:'#3a4232' },
  { min:1500,      name:'First Green',     core:'#8fcf6b', mid:'#3a6b32' },
  { min:40000,     name:'Fertile Plains',  core:'#7be08a', mid:'#2e8b4f' },
  { min:800000,    name:'Water World',     core:'#6bd6e0', mid:'#2e6b8b' },
  { min:25000000,  name:'Living Planet',   core:'#9be07b', mid:'#2e8b5f' },
  { min:800000000, name:'Gaia Civilization',core:'#e0d36b',mid:'#8b7a2e' },
  { min:5e10,      name:'Perfect World',   core:'#b98bff', mid:'#5b3a8b' },
  { min:2e12,      name:'Star System',     core:'#ffd866', mid:'#7a5b1e' },
  { min:8e13,      name:'Young Galaxy',    core:'#9be0ff', mid:'#2e5b8b' },
  { min:3e15,      name:'Sentient Nebula', core:'#ff9be0', mid:'#8b2e6b' },
  { min:1e17,      name:'Cosmic Web',      core:'#c9a0ff', mid:'#4b2e8b' },
  { min:5e18,      name:'Gaia Reality',    core:'#a0ffe0', mid:'#2e8b7a' },
];

// Planet journey — explore a sequence of worlds (Idle Planet Miner style).
// Travel unlocks at a lifetime-biomass goal; each planet grants a permanent x1.4 production.
const PLANETS = [
  { name:'Terra Prime', emoji:'🌍', core:'#7be08a', mid:'#2e8b4f', goal:0,    fx:'clouds',  amb:'☁️', dir:'float' },
  { name:'Aquaria',     emoji:'🌊', core:'#6bd6e0', mid:'#2e6b8b', goal:5e3,  fx:'water',   amb:'💧', dir:'up' },
  { name:'Verdantia',   emoji:'🌿', core:'#9be07b', mid:'#2e8b5f', goal:5e5,  fx:'lush',    amb:'🍃', dir:'up' },
  { name:'Ember',       emoji:'🔥', core:'#ff9b6b', mid:'#8b3a2e', goal:5e7,  fx:'lava',    amb:'🔥', dir:'up' },
  { name:'Glacius',     emoji:'🧊', core:'#bfe9ff', mid:'#2e5b8b', goal:5e9,  fx:'ice',     amb:'❄️', dir:'down' },
  { name:'Auroria',     emoji:'🟡', core:'#ffd866', mid:'#8b7a2e', goal:5e11, fx:'aurora',  amb:'✨', dir:'float' },
  { name:'Violetia',    emoji:'🟣', core:'#c9a0ff', mid:'#4b2e8b', goal:5e13, fx:'nebula',  amb:'💜', dir:'float' },
  { name:'Cinderon',    emoji:'🔴', core:'#ff7b8a', mid:'#8b2e3a', goal:5e15, fx:'volcano', amb:'💨', dir:'up' },
  { name:'Nebulon',     emoji:'🌌', core:'#ff9be0', mid:'#8b2e6b', goal:5e17, fx:'cosmic',  amb:'⭐', dir:'float' },
  { name:'Gaia Eterna', emoji:'✨', core:'#a0ffe0', mid:'#2e8b7a', goal:5e19, fx:'divine',  amb:'🌟', dir:'float' },
];

const ACHIEVEMENTS = [
  { id:'first',    emoji:'👆', name:'First Touch',      desc:'Tap the planet',       check:s=>s.clicks>=1 },
  { id:'spora1',   emoji:'🦠', name:'Genesis',          desc:'Buy first Spore',      check:s=>s.gens.spora>=1 },
  { id:'k1',       emoji:'🌱', name:'Sprout',           desc:'1K biomass',           check:s=>s.lifetime>=1000 },
  { id:'m1',       emoji:'🌳', name:'Lush',             desc:'1M biomass',           check:s=>s.lifetime>=1e6 },
  { id:'water',    emoji:'💧', name:'Water World',      desc:'Reach the water stage',check:s=>s.runEarned>=800000 },
  { id:'g100',     emoji:'🏭', name:'Industrialist',    desc:'100 generators',       check:s=>totalGens()>=100 },
  { id:'prest1',   emoji:'🌟', name:'Rebirth',          desc:'First prestige',       check:s=>s.prestigeCount>=1 },
  { id:'gaia25',   emoji:'💫', name:'Gaia Keeper',      desc:'25 Gaia Spores',       check:s=>s.gaiaSpores>=25 },
  { id:'allupg',   emoji:'⚡', name:'Collector',        desc:'All upgrades',         check:s=>UPGRADES.every(u=>s.upgrades[u.id]) },
  { id:'offline',  emoji:'💤', name:'Patience',         desc:'Claim offline gains',  check:s=>s.claimedOffline },
  { id:'clicks100',emoji:'💪', name:'Diligent',         desc:'100 taps',             check:s=>s.clicks>=100 },
  { id:'boost1',   emoji:'🔥', name:'Acceleration',     desc:'Activate a boost',     check:s=>s.boostUntil>0 },
  { id:'golden1',  emoji:'🌟', name:'Gold Hunter',      desc:'Catch a golden sprout',check:s=>s.goldenCaught>=1 },
  { id:'allgen',   emoji:'🌐', name:'Cosmic Master',    desc:'Own every generator',  check:s=>GENERATORS.every(g=>s.gens[g.id]>0) },
  { id:'galaxy1',  emoji:'⭐', name:'Galaxy Forger',    desc:'Forge first galaxy',   check:s=>s.galaxyCount>=1 },
  { id:'bintang25',emoji:'✨', name:'Star Cluster',     desc:'Collect 25 Stars',     check:s=>s.bintang>=25 },
  { id:'universe1',emoji:'🌀', name:'Universe Maker',   desc:'Create first universe',check:s=>s.universeCount>=1 },
  { id:'mgr1',     emoji:'👷', name:'First Hire',       desc:'Hire a manager',       check:s=>Object.keys(s.managers||{}).length>=1 },
  { id:'explore1', emoji:'🚀', name:'Explorer',         desc:'Travel to a new planet',check:s=>(s.planetIndex||0)>=1 },
  { id:'voyager',  emoji:'🪐', name:'Voyager',          desc:'Discover every planet', check:s=>(s.planetIndex||0)>=PLANETS.length-1 },
];

const COST_GROWTH = 1.18;
const SAVE_KEY = 'gaia_save_v3';
const TICK_MS = 100;
// Layer 1 — Planet (Gaia Spores 🌟): frontier from biomass/run
const GAIA_DIV = 100000;        // runEarned per spore (sqrt)
const GAIA_BONUS = 0.05;        // factor = 1 + gaia*0.05
// Layer 2 — Galaxy (Stars ⭐): frontier from Gaia Spores
const GAL_REQ = 250;            // min gaia to unlock Galaxy (= BINTANG_DIV, so unlock = when prestige is possible)
const BINTANG_DIV = 250;        // gaia per bintang (akar)
const BINTANG_BONUS = 2;        // faktor = 1 + bintang*2
// Lapisan 3 — Semesta (Singularitas 🌀): frontier dari Bintang
const UNI_REQ = 300;            // bintang minimum untuk membuka lapisan Semesta
const SING_DIV = 300;           // bintang per singularitas (akar)
const SING_BONUS = 12;          // faktor = 1 + sing*12
const ACH_BONUS = 0.01;         // +1% per achievement

// ---------- STATE ----------
let state = {
  biomass: 0, runEarned: 0, lifetime: 0,
  gens: {}, upgrades: {}, achs: {}, managers: {},
  gaiaSpores: 0, prestigeCount: 0,
  bintang: 0, galaxyCount: 0, galaxyUnlocked: false,
  singularitas: 0, universeCount: 0, universeUnlocked: false,
  planetIndex: 0,
  clicks: 0, claimedOffline: false,
  soundOn: true, musicOn: true, lastSave: Date.now(),
  boostUntil: 0, adsRemoved: false, adCooldownUntil: 0, goldenCaught: 0,
};
GENERATORS.forEach(g => state.gens[g.id] = 0);

let currentTab = 'gen';
let buyMode = 1; // 1, 10, 'max'

// ---------- HELPERS ----------
function fmt(n) {
  if (n < 1000) return (Math.abs(n % 1) < 1e-9 ? Math.round(n) : n.toFixed(1)).toString();
  const units = ['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];
  let tier = Math.floor(Math.log10(n) / 3);
  if (tier >= units.length) tier = units.length - 1;
  const s = n / Math.pow(10, tier*3);
  return s.toFixed(s<10?2:s<100?1:0) + units[tier];
}
function totalGens(){ let t=0; GENERATORS.forEach(g=>t+=state.gens[g.id]); return t; }
function genCost(g, owned){ return Math.floor(g.baseCost * Math.pow(COST_GROWTH, owned)); }

// total harga membeli n unit mulai dari kepemilikan 'owned'
function bulkCost(g, n){
  const r = COST_GROWTH, b = g.baseCost, o = state.gens[g.id];
  return Math.floor(b * Math.pow(r,o) * (Math.pow(r,n)-1) / (r-1));
}
// berapa unit yang mampu dibeli dengan biomassa sekarang
function maxAffordable(g){
  const r = COST_GROWTH, b = g.baseCost, o = state.gens[g.id], money = state.biomass;
  const base = b * Math.pow(r,o);
  if (money < base) return 0;
  return Math.floor(Math.log( (money*(r-1))/base + 1 ) / Math.log(r));
}
function buyQty(g){
  if (buyMode === 'max') return Math.max(1, maxAffordable(g));
  return buyMode;
}

// faktor bonus tiap lapisan (ADITIF → stabil, anti-runaway)
function gaiaMult(){ return 1 + state.gaiaSpores * GAIA_BONUS; }
function bintangMult(){ return 1 + state.bintang * BINTANG_BONUS; }
function singMult(){ return 1 + state.singularitas * SING_BONUS; }
function achMult(){ return 1 + Object.keys(state.achs).length * ACH_BONUS; }
function upgAllMult(){ let m=1; UPGRADES.forEach(u=>{ if(u.type==='all'&&state.upgrades[u.id]) m*=u.mult; }); return m; }
function upgClickMult(){ let m=1; UPGRADES.forEach(u=>{ if(u.type==='click'&&state.upgrades[u.id]) m*=u.mult; }); return m; }
function boostActive(){ return Date.now() < state.boostUntil; }
function boostMult(){ return (boostActive() ? 2 : 1) * (state.adsRemoved ? 2 : 1); }
function planetMult(){ return Math.pow(1.4, state.planetIndex); }
function nextPlanet(){ return PLANETS[state.planetIndex+1] || null; }
function canTravel(){ const n=nextPlanet(); return !!n && state.lifetime >= n.goal; }
function globalMult(){ return upgAllMult() * gaiaMult() * bintangMult() * singMult() * achMult() * boostMult() * planetMult(); }
function doTravel(){
  if(!canTravel()) return;
  state.planetIndex++;
  const pl=PLANETS[state.planetIndex];
  sfx('prestige'); screenFlash(pl.core+'cc'); burstParticles(pl.emoji, 16);
  toast(`🚀 Traveled to ${pl.name}!`);
  updateStats(); renderShop(); save(true);
}
// Managers: per-generator multiplier with upgradeable levels (Lv1 ×2, Lv2 ×3, ...)
function managerLevel(id){ return state.managers[id]||0; }
function managerMult(id){ const l=managerLevel(id); return l>0 ? 1+l : 1; }
function managerCost(g){ return Math.floor(g.baseCost * 40 * Math.pow(7, managerLevel(g.id))); }
// Milestones: owning more of a generator doubles its output at set thresholds (Idle Planet Miner style)
const MILES=[10,25,50,100,150,200,300,400,500,750,1000];
function milestoneCount(n){ let c=0; for(const m of MILES){ if(n>=m) c++; } if(n>1000) c+=Math.floor((n-1000)/500); return c; }
function milestoneMult(id){ return Math.pow(2, milestoneCount(state.gens[id]||0)); }
function nextMilestone(n){ for(const m of MILES){ if(n<m) return m; } return 1000+Math.ceil((Math.max(n,1000)-999)/500)*500; }
function perSec(){ let t=0; GENERATORS.forEach(g=>t+=state.gens[g.id]*g.rate*managerMult(g.id)*milestoneMult(g.id)); return t*globalMult(); }
function clickPower(){ return 1 * upgClickMult() * globalMult(); }

// Model "frontier" tiap lapisan: hanya dapat mata uang bila memecahkan rekor.
function potentialGaia(){ return Math.max(0, Math.floor(Math.sqrt(state.runEarned / GAIA_DIV)) - state.gaiaSpores); }
function nextSporeReq(){ return Math.pow(state.gaiaSpores + 1, 2) * GAIA_DIV; }
function potentialBintang(){ return Math.max(0, Math.floor(Math.sqrt(state.gaiaSpores / BINTANG_DIV)) - state.bintang); }
function nextBintangReq(){ return Math.pow(state.bintang + 1, 2) * BINTANG_DIV; }   // dalam Gaia
function potentialSing(){ return Math.max(0, Math.floor(Math.sqrt(state.bintang / SING_DIV)) - state.singularitas); }
function nextSingReq(){ return Math.pow(state.singularitas + 1, 2) * SING_DIV; }     // dalam Bintang

function currentStage(){ let s=STAGES[0]; for(const st of STAGES) if(state.runEarned>=st.min) s=st; return s; }

// ---------- ACTIONS ----------
function addBiomass(a){ state.biomass+=a; state.runEarned+=a; state.lifetime+=a; }

function buyGen(g){
  const qty = buyQty(g);
  const cost = bulkCost(g, qty);
  if (qty<1 || state.biomass < cost) return;
  state.biomass -= cost;
  const before = milestoneCount(state.gens[g.id]);
  state.gens[g.id] += qty;
  const after = milestoneCount(state.gens[g.id]);
  sfx('buy');
  if (after > before){ toast(`${g.emoji} ${g.name} ×2! (${state.gens[g.id]} owned)`); sfx('ach'); burstParticles('⭐', 8); }
  renderShop(); updateStats();
}
function buyUpgrade(u){
  if (state.upgrades[u.id] || state.biomass < u.cost) return;
  state.biomass -= u.cost; state.upgrades[u.id] = true;
  sfx('upg'); toast(`${u.emoji} ${u.name} aktif!`);
  renderShop(); updateStats();
}
function doPrestige(){
  const gain = potentialGaia();
  if (gain < 1) return;
  if (!confirm(`Rebirth the planet?\n\nYou will gain ${gain} 🌟 Gaia Spores (permanent bonus +${(gain*GAIA_BONUS*100).toFixed(0)}%).\n\nBiomass, generators & upgrades reset. Gaia Spores & achievements stay.`)) return;
  state.gaiaSpores += gain;
  state.prestigeCount++;
  resetRun();
  sfx('prestige'); screenFlash(); burstParticles('🌟', 16);
  toast(`🌟 +${gain} Gaia Spores! A new planet is born.`);
  renderShop(); updateStats(); save(true);
}
// reset level "run" (biomassa, generator, upgrade) — dipakai semua lapisan
function resetRun(){
  state.biomass = 0; state.runEarned = 0;
  GENERATORS.forEach(g=>state.gens[g.id]=0);
  state.upgrades = {};
  state.managers = {};
}
function doGalaxy(){
  const gain = potentialBintang();
  if (gain < 1) return;
  if (!confirm(`Forge a new Galaxy?\n\nGain ${gain} ⭐ Stars (permanent bonus +${(gain*BINTANG_BONUS*100).toFixed(0)}%).\n\nGaia Spores, biomass, generators & upgrades RESET. Stars & Singularities stay.`)) return;
  state.bintang += gain;
  state.galaxyCount++;
  state.gaiaSpores = 0;
  resetRun();
  sfx('prestige'); screenFlash(); burstParticles('⭐', 18);
  toast(`⭐ +${gain} Stars! A new galaxy is forged.`);
  renderShop(); updateStats(); save(true);
}
function doUniverse(){
  const gain = potentialSing();
  if (gain < 1) return;
  if (!confirm(`Create a new Universe?\n\nGain ${gain} 🌀 Singularities (STRONGEST permanent bonus +${(gain*SING_BONUS*100).toFixed(0)}%).\n\nEVERYTHING resets except Singularities & achievements.`)) return;
  state.singularitas += gain;
  state.universeCount++;
  state.bintang = 0;
  state.gaiaSpores = 0;
  resetRun();
  sfx('prestige'); screenFlash(); burstParticles('🌀', 20);
  toast(`🌀 +${gain} Singularities! A new universe is created.`);
  renderShop(); updateStats(); save(true);
}

// ---------- RENDER ----------
const $ = id => document.getElementById(id);
let lastStageMin = -1;

function updateStats(){
  $('biomass').textContent = fmt(state.biomass);
  $('perSec').textContent = fmt(perSec());
  // mata uang prestige (tampil berlapis sesuai yang terbuka)
  let cur = fmt(state.gaiaSpores)+'🌟';
  if(state.bintang>0 || state.galaxyUnlocked) cur += ' '+fmt(state.bintang)+'⭐';
  if(state.singularitas>0 || state.universeUnlocked) cur += ' '+fmt(state.singularitas)+'🌀';
  $('gaiaTop').textContent = cur;
  const gm = globalMult();
  $('multTop').textContent = gm<1000 ? gm.toFixed(gm<10?2:1) : fmt(gm);
  // buka lapisan saat ambang tercapai
  if(!state.galaxyUnlocked && state.gaiaSpores>=GAL_REQ){ state.galaxyUnlocked=true; toast('⭐ GALAXY layer unlocked! Check the 🌟 tab'); sfx('ach'); }
  if(!state.universeUnlocked && state.bintang>=UNI_REQ){ state.universeUnlocked=true; toast('🌀 UNIVERSE layer unlocked! Check the 🌟 tab'); sfx('ach'); }
  const pd=$('prestigeDot'); if(pd) pd.style.display = (potentialGaia()>=1||potentialBintang()>=1||potentialSing()>=1)?'block':'none';
  const pld=$('planetDot'); if(pld) pld.style.display = canTravel()?'block':'none';
  const stage = currentStage();
  const pl = PLANETS[state.planetIndex] || PLANETS[0];
  $('stageName').textContent = `${pl.emoji} ${pl.name} · ${stage.name}`;
  const p = $('planet');
  p.style.background = `radial-gradient(circle at 35% 30%, ${pl.core}, ${pl.mid} 70%, #1a1c28)`;
  const glow = Math.min(45, 8 + Math.log10(state.runEarned+1)*4.5);
  p.style.boxShadow = `0 0 ${glow}px ${glow/2}px ${pl.core}66`;
  const fx=$('planetFx'); if(fx){ const cls='planet-fx fx-'+(pl.fx||'clouds'); if(fx.className!==cls) fx.className=cls; }
  // deteksi naik stage
  if (lastStageMin !== -1 && stage.min > lastStageMin) {
    onStageUp(stage);
  }
  lastStageMin = stage.min;
  updateBoostUI();
  updateFlora();
  // tab achievement news
  checkAchievements();
}

function updateBoostUI(){
  const info=$('boostInfo'); const parts=[];
  if(state.adsRemoved) parts.push('💎 x2 permanent');
  if(boostActive()) parts.push('🔥 x2 boost ('+boostRemainStr()+')');

// ---------- FLORA (life icons on the planet surface) ----------
// biome color per generator — drives the look of surface features
const BIOME={ spora:'#7be08a',lumut:'#5ec77a',semak:'#3da35a',pohon:'#2e8b4f',hutan:'#1f7340',
  danau:'#5bc8e0',satwa:'#9bd07b',koloni:'#ffd866',kota:'#ffcf5a',orbit:'#bfe9ff',
  bulan:'#cfd8ff',mars:'#ff9b6b',asteroid:'#caa37a',dyson:'#ffe08a',mtbuatan:'#fff2a0',
  warp:'#a0ffe0',cincin:'#dcdcff',nebula:'#ff9be0',kluster:'#c9a0ff',jaring:'#a0ffe0' };
// how many little features a generator shows — grows (log) as you buy more, capped
function featCount(n){ return n<=0?0:Math.min(9, 1+Math.floor(Math.log2(n))); }
function surfaceSig(){ return GENERATORS.map(g=>featCount(state.gens[g.id]||0)).join(','); }
let lastSurfaceSig='';
function updateFlora(){
  const sig=surfaceSig(); if(sig===lastSurfaceSig) return;   // rebuild only when density changes
  lastSurfaceSig=sig;
  const f=$('flora'); if(!f) return; f.innerHTML='';
  GENERATORS.forEach((g,gi)=>{
    const cnt=featCount(state.gens[g.id]||0); if(cnt<=0) return;
    const color=BIOME[g.id]||'#8fcf6b';
    const water=(g.id==='danau');
    const light=(g.id==='koloni'||g.id==='kota'||gi>=9); // cities & space = tiny glowing lights
    for(let k=0;k<cnt;k++){
      const h =Math.sin(gi*97.13+k*53.7)*0.5+0.5;          // deterministic 0..1
      const h2=Math.sin(gi*131.7+k*29.3)*0.5+0.5;
      const ang=h*Math.PI*2, rad=8+h2*34;                  // % from center, inside the disc
      const x=50+rad*Math.cos(ang), y=52+rad*Math.sin(ang);
      const d=document.createElement('i');
      let size;
      if(light){ size=1.6+h*1.3; d.style.boxShadow='0 0 3px '+color; d.style.opacity='0.95'; }
      else if(water){ size=4+h*3; d.style.filter='blur(1.4px)'; d.style.opacity='0.8'; }
      else { size=3+h*2.4; d.style.filter='blur(1px)'; d.style.opacity='0.8'; }   // green clumps
      d.style.left=x+'%'; d.style.top=y+'%';
      d.style.width=size+'px'; d.style.height=size+'px'; d.style.background=color;
      f.appendChild(d);
    }
  });
}

function burstParticles(emoji, count){
  const area=document.querySelector('.planet-area'); const rect=area.getBoundingClientRect();
  const cx=rect.width/2, cy=rect.height/2;
  for(let i=0;i<count;i++){
    const pt=document.createElement('div'); pt.className='particle'; pt.textContent=emoji;
    const ang=(Math.PI*2/count)*i; const dist=70+i%3*15;
    pt.style.left=cx+'px'; pt.style.top=cy+'px';
    pt.style.setProperty('--dx', Math.cos(ang)*dist+'px');
    area.appendChild(pt);
    const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    pt.animate([{transform:'translate(0,0) scale(0.4)',opacity:1},
                {transform:`translate(${dx}px,${dy}px) scale(1.2)`,opacity:0}],
               {duration:1000,easing:'ease-out'});
    setTimeout(()=>pt.remove(),1000);
  }
}

let actx=null;
function initAudio(){ if(!actx && window.AudioContext){ actx=new AudioContext(); } if(actx&&actx.state==='suspended') actx.resume(); }
function tone(freq, dur, type='sine', vol=0.08){
  if(!state.soundOn || !actx) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime+dur);
}
function sfx(kind){
  if(!state.soundOn) return;
  initAudio();
  if(kind==='click') tone(420+Math.random()*40, 0.08, 'triangle', 0.05);
  else if(kind==='buy') tone(560,0.1,'square',0.06);
  else if(kind==='upg'){ tone(660,0.1); setTimeout(()=>tone(880,0.12),80); }
  else if(kind==='ach'){ tone(700,0.1); setTimeout(()=>tone(1050,0.15),100); }
  else if(kind==='stage'){ [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'sine',0.07),i*90)); }
  else if(kind==='prestige'){ [392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'sine',0.08),i*100)); }
}

const MUSIC_SCALE=[174.6,196,220,261.6,293.7,349.2,392,440,523.3]; // gentle pentatonic-ish pad
function musicTone(freq, dur, vol){
  if(!actx || !state.musicOn) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type='sine'; o.frequency.value=freq;
  const t0=actx.currentTime;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(vol, t0+dur*0.35);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t0); o.stop(t0+dur);
}
function startMusic(){
  initAudio();
  if(musicTimer) return; // satu scheduler saja; toggle dikendalikan state.musicOn
  musicTimer=setInterval(()=>{
    if(!state.musicOn || !actx || actx.state!=='running') return;
    mStep++;
    if(Math.random()<0.72){ // melodi lembut (kadang jeda)
      const f=MUSIC_SCALE[Math.floor(Math.random()*MUSIC_SCALE.length)];
      musicTone(f, 1.8, 0.035);
    }
    if(mStep%4===0) musicTone(MUSIC_SCALE[0]/2, 3.4, 0.03);          // bass pad
    if(Math.random()<0.14) musicTone(MUSIC_SCALE[MUSIC_SCALE.length-1]*2, 0.9, 0.018); // sparkle
  }, 720);
}

// ---------- REWARDED AD (simulated) ----------
// NOTE: in the release build, replace the body of watchAd with a real ad SDK
// (AdMob via TWA, or Google Ad Manager). Call reward() in the "onRewarded" callback.
let adTimer=null;
function watchAd(label, reward){
  initAudio();
  const ov=$('adOverlay'), bar=$('adBar'), skip=$('adSkip');
  $('adTitle').textContent='Ad: '+label;
  bar.style.width='0%'; skip.style.display='none'; ov.classList.add('show');
  const dur=4000, start=Date.now(); let done=false;
  if(adTimer) clearInterval(adTimer);
  adTimer=setInterval(()=>{
    const p=Math.min(1,(Date.now()-start)/dur);
    bar.style.width=(p*100)+'%';
    if(p>=0.25) skip.style.display='block';
    if(p>=1 && !done){ done=true; clearInterval(adTimer); ov.classList.remove('show'); sfx('ach'); reward(); }
  },50);
  skip.onclick=()=>{ if(done) return; clearInterval(adTimer); ov.classList.remove('show'); toast('Ad skipped — reward cancelled'); };
}

let goldenEl=null;
function scheduleGolden(){
  const delay=(60+Math.random()*120)*1000; // 60–180 detik
  setTimeout(spawnGolden, delay);
}
function spawnGolden(){
  if(goldenEl) return;
  goldenEl=document.createElement('div'); goldenEl.className='golden'; goldenEl.textContent='🌟';
  goldenEl.style.left=(8+Math.random()*72)+'vw';
  goldenEl.style.top=(18+Math.random()*55)+'vh';
  goldenEl.onclick=()=>{
    state.goldenCaught++;
    const roll=Math.random();
    if(roll<0.5){ const amt=Math.max(50, perSec()*60*5); addBiomass(amt); toast(`🌟 Golden Sprout! +${fmt(amt)} 🌿`); }
    else if(roll<0.85){ state.boostUntil=Math.max(state.boostUntil,Date.now())+5*60*1000; toast('🌟 Golden Sprout! x2 boost for 5 minutes!'); }
    else { state.gaiaSpores+=1; toast('🌟 Rare! +1 Gaia Spore!'); }
    burstParticles('✨',14); sfx('stage');
    goldenEl.remove(); goldenEl=null; updateStats();
    if(currentTab==='gen'||currentTab==='boost') renderShop();
    scheduleGolden();
  };

  setTimeout(()=>{ if(goldenEl){ goldenEl.remove(); goldenEl=null; scheduleGolden(); } }, 9000);
}

// ---------- SAVE / LOAD ----------
function save(silent){
  state.lastSave=Date.now();
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  if(!silent) toast('💾 Saved');
}
function load(){
  const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false;
  try{
    const s=JSON.parse(raw); state=Object.assign(state, s);
    GENERATORS.forEach(g=>{ if(state.gens[g.id]==null) state.gens[g.id]=0; });
    if(!state.achs) state.achs={}; if(!state.upgrades) state.upgrades={}; if(!state.managers) state.managers={};
    return true;
  }catch(e){ return false; }
}
function applyOffline(){
  const now=Date.now();
  const elapsed=Math.min((now-state.lastSave)/1000, 60*60*10);
  if(elapsed<5) return;
  const gain=perSec()*elapsed; if(gain<=0) return;
  addBiomass(gain); state.claimedOffline=true;
  $('offlineGain').textContent='+'+fmt(gain)+' 🌿';
  const mins=Math.floor(elapsed/60), hrs=Math.floor(mins/60);
  $('offlineTime').textContent = hrs>0?`You were away ${hrs}h ${mins%60}m`:`You were away ${mins}m`;
  $('offlineModal').classList.add('show');
}
$('offlineOk').onclick=()=>$('offlineModal').classList.remove('show');
$('saveBtn').onclick=()=>save(false);
$('resetBtn').onclick=()=>{ if(confirm('Reset ALL progress including Gaia Spores? This cannot be undone.')){ localStorage.removeItem(SAVE_KEY); location.reload(); } };
$('soundBtn').onclick=()=>{ state.soundOn=!state.soundOn; initAudio(); $('soundBtn').textContent=state.soundOn?'🔊 Sound':'🔇 Muted'; if(state.soundOn) sfx('buy'); };
$('musicBtn').onclick=()=>{ state.musicOn=!state.musicOn; initAudio(); startMusic(); $('musicBtn').textContent=state.musicOn?'🎵 Music':'🎵 Music off'; };
setInterval(()=>save(true),15000);

// ---------- METEORS / SHOOTING STARS ----------
function spawnMeteor(){
  const big=Math.random()<0.18;
  const m=document.createElement('div'); m.className='meteor'+(big?' big':'');
  const W=window.innerWidth, H=window.innerHeight;
  const startX=W*(0.25+Math.random()*0.7), startY=-30;
  const len=H*(0.7+Math.random()*0.5);
  const aDeg=110+Math.random()*25;            // arah jatuh: bawah-kiri
  const a=aDeg*Math.PI/180, dx=Math.cos(a)*len, dy=Math.sin(a)*len;
  const trail=aDeg+180;                        // ekor menunjuk berlawanan arah gerak
  m.style.left=startX+'px'; m.style.top=startY+'px';
  document.body.appendChild(m);
  m.animate([
    {transform:`translate(0,0) rotate(${trail}deg)`, opacity:0},
    {opacity:1, offset:0.12},
    {transform:`translate(${dx}px,${dy}px) rotate(${trail}deg)`, opacity:0}
  ], {duration:(big?1500:950)+Math.random()*400, easing:'linear'});
  setTimeout(()=>m.remove(), 2200);
}
function scheduleMeteors(){ setInterval(()=>{ if(document.hidden) return; if(Math.random()<0.6) spawnMeteor(); }, 3500); }

// ---------- PER-PLANET AMBIENT PARTICLES ----------
function spawnAmbient(){
  if(document.hidden) return;
  const pl=PLANETS[state.planetIndex]||PLANETS[0]; if(!pl.amb) return;
  const area=document.querySelector('.planet-area'); if(!area) return;
  const rect=area.getBoundingClientRect(); const cx=rect.width/2, cy=rect.height/2;
  const s=document.createElement('span'); s.className='ambient'; s.textContent=pl.amb;
  let x=cx+(Math.random()*2-1)*70, y=cy+(Math.random()*2-1)*70, dx=0, dy=0;
  if(pl.dir==='up'){ y=cy+95; x=cx+(Math.random()*2-1)*80; dy=-120; dx=(Math.random()*2-1)*25; }
  else if(pl.dir==='down'){ y=cy-95; x=cx+(Math.random()*2-1)*80; dy=120; dx=(Math.random()*2-1)*25; }
  else { dx=(Math.random()*2-1)*35; dy=(Math.random()*2-1)*35; }
  s.style.left=x+'px'; s.style.top=y+'px';
  area.appendChild(s);
  s.animate([{transform:'translate(0,0) scale(0.6)',opacity:0},
             {opacity:0.9,offset:0.2},
             {transform:`translate(${dx}px,${dy}px) scale(1)`,opacity:0}],
            {duration:2200+Math.random()*800,easing:'ease-out'});
  setTimeout(()=>s.remove(),3200);
}
function scheduleAmbient(){ setInterval(spawnAmbient, 1400); }

// ====== PROCEDURAL PLANET (canvas: lit sphere + noise continents + ice + atmosphere) ======
const PLANET_PAL = [
  {o:'#1f5fa6',l:'#3a8b4f',m:'#6b6b5a',i:'#eaf6ff',a:'#7fb3ff'}, // Terra
  {o:'#1565b0',l:'#2e8b6b',m:'#5a7a6b',i:'#eaf6ff',a:'#7fd0ff'}, // Aquaria
  {o:'#1f6f8b',l:'#2f9b3f',m:'#6b7a3a',i:'#eaffea',a:'#9fe0a0'}, // Verdantia
  {o:'#c43a10',l:'#3a2520',m:'#140c0a',i:'#ff8a4a',a:'#ff7a3a'}, // Ember (lava/rock)
  {o:'#2e6b9b',l:'#cfe9ff',m:'#9fbfe0',i:'#ffffff',a:'#bfe9ff'}, // Glacius
  {o:'#7a5b1e',l:'#caa83a',m:'#8b7320',i:'#fff2c0',a:'#ffe08a'}, // Auroria
  {o:'#3a2570',l:'#8b5cc0',m:'#5b3a8b',i:'#e8d8ff',a:'#c9a0ff'}, // Violetia
  {o:'#7a1622',l:'#5b2030',m:'#240d12',i:'#ff8a9a',a:'#ff7b8a'}, // Cinderon
  {o:'#5a2560',l:'#b03a8b',m:'#7a2e6b',i:'#ffd0f0',a:'#ff9be0'}, // Nebulon
  {o:'#1f7a6b',l:'#3fc0a0',m:'#2e8b7a',i:'#d0fff0',a:'#a0ffe0'}, // Gaia Eterna
];
function hx(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
const HMW=200, HMH=100; let HMAP=null, PAL=[];
function rand3(x,y,z){ const s=Math.sin(x*12.9898+y*78.233+z*37.719)*43758.5453; return s-Math.floor(s); }
function vn3(x,y,z){
  const xi=Math.floor(x),yi=Math.floor(y),zi=Math.floor(z),xf=x-xi,yf=y-yi,zf=z-zi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf),w=zf*zf*(3-2*zf), L=(a,b,t)=>a+(b-a)*t, c=(a,b,d)=>rand3(xi+a,yi+b,zi+d);
  const x00=L(c(0,0,0),c(1,0,0),u),x10=L(c(0,1,0),c(1,1,0),u),x01=L(c(0,0,1),c(1,0,1),u),x11=L(c(0,1,1),c(1,1,1),u);
  return L(L(x00,x10,v),L(x01,x11,v),w);
}
function buildHeightmap(){
  HMAP=new Float32Array(HMW*HMH);
  for(let y=0;y<HMH;y++){ const lat=(y/HMH-0.5)*Math.PI, cl=Math.cos(lat), sl=Math.sin(lat);
    for(let x=0;x<HMW;x++){ const lon=x/HMW*2*Math.PI, px=cl*Math.cos(lon), py=sl, pz=cl*Math.sin(lon);
      let e=0,amp=0.55,f=1.6; for(let o=0;o<5;o++){ e+=vn3(px*f+10,py*f+20,pz*f+30)*amp; amp*=0.5; f*=2.05; }
      HMAP[y*HMW+x]=e; } }
}
let pcv,pctx,pim,pdat,pN=0,pLat,pLon0,pShade,pRim,pMask,prot=0,pTimer=null;
function initPlanetGfx(){
  pcv=document.getElementById('planetCanvas'); if(!pcv||!pcv.getContext) return;
  PAL=PLANET_PAL.map(p=>{const o=hx(p.o);return {o,od:[o[0]*0.5,o[1]*0.5,o[2]*0.5],l:hx(p.l),m:hx(p.m),i:hx(p.i),a:hx(p.a)};});
  buildHeightmap();
  pN=pcv.width; pctx=pcv.getContext('2d'); pim=pctx.createImageData(pN,pN); pdat=pim.data;
  const R=pN/2, lx=-0.5,ly=-0.55,lz=0.67;
  pLat=new Float32Array(pN*pN);pLon0=new Float32Array(pN*pN);pShade=new Float32Array(pN*pN);pRim=new Float32Array(pN*pN);pMask=new Uint8Array(pN*pN);
  for(let y=0;y<pN;y++) for(let x=0;x<pN;x++){ const i=y*pN+x, nx=(x-R+0.5)/R, ny=(y-R+0.5)/R, d2=nx*nx+ny*ny;
    if(d2>1){ pMask[i]=0; continue; } pMask[i]=1; const nz=Math.sqrt(1-d2);
    pLat[i]=Math.asin(ny<-1?-1:ny>1?1:ny); pLon0[i]=Math.atan2(nx,nz);
    let diff=nx*lx+ny*ly+nz*lz; if(diff<0)diff=0; pShade[i]=Math.min(1.25,0.22+0.95*diff); pRim[i]=Math.pow(1-nz,3);
  }
  if(pTimer) clearInterval(pTimer); pTimer=setInterval(drawPlanet,55); drawPlanet();
}
function drawPlanet(){
  if(!pctx||document.hidden) return;
  prot+=0.006;
  const pal=PAL[state.planetIndex]||PAL[0], o=pal.o,od=pal.od,l=pal.l,m=pal.m,ice=pal.i,atmo=pal.a, SEA=0.46, TP=2*Math.PI;
  for(let i=0;i<pN*pN;i++){ const di=i*4;
    if(!pMask[i]){ pdat[di+3]=0; continue; }
    let lon=(pLon0[i]+prot)/TP; lon-=Math.floor(lon); const lat=pLat[i];
    const ix=(lon*HMW)|0; let iy=((lat/Math.PI+0.5)*HMH)|0; if(iy<0)iy=0; else if(iy>=HMH)iy=HMH-1;
    const h=HMAP[iy*HMW+(ix>=HMW?HMW-1:ix)];
    let r,g,b;
    if(h<SEA){ const t=h/SEA; r=od[0]+(o[0]-od[0])*t; g=od[1]+(o[1]-od[1])*t; b=od[2]+(o[2]-od[2])*t; }
    else { if(h>0.72){ const mt=(h-0.72)/0.28; r=l[0]+(m[0]-l[0])*mt; g=l[1]+(m[1]-l[1])*mt; b=l[2]+(m[2]-l[2])*mt; }
      else { const t=(h-SEA)/(1-SEA); r=l[0]; g=l[1]; b=l[2]; if(t<0.15){ const c=0.82+t/0.15*0.18; r*=c; g*=c; b*=c; } } }
    const al=lat<0?-lat:lat; if(al>1.1){ let t=(al-1.1)/0.47; if(t>1)t=1; t*=0.92; r+=(ice[0]-r)*t; g+=(ice[1]-g)*t; b+=(ice[2]-b)*t; }
    const sh=pShade[i]; r*=sh; g*=sh; b*=sh;
    const rim=pRim[i]*0.9; r+=atmo[0]*rim; g+=atmo[1]*rim; b+=atmo[2]*rim;
    pdat[di]=r>255?255:r; pdat[di+1]=g>255?255:g; pdat[di+2]=b>255?255:b; pdat[di+3]=255;
  }
  pctx.putImageData(pim,0,0);
}
